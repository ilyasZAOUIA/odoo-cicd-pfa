name: CI/CD Odoo BAAM

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint
      - run: pip install flake8 pylint-odoo
      - run: flake8 custom_addons/mon_module_demo/
      - run: pylint --load-plugins=pylint_odoo -d all -e odoolint --disable=missing-readme,manifest-required-author custom_addons/mon_module_demo/
      - name: Notifier Discord en cas d'échec
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "embeds": [{
              "title": "❌ Échec du pipeline — job: ${{ github.job }}",
              "color": 15158332,
              "fields": [
                {"name": "Branche", "value": "${{ github.ref_name }}", "inline": true},
                {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                {"name": "Logs", "value": "[Voir les logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }' ${{ secrets.DISCORD_WEBHOOK }}

  build-image:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ghcr.io/${{ steps.lowercase.outputs.owner }}/odoo-baam:${{ github.sha }}
      owner: ${{ steps.lowercase.outputs.owner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Convertir en minuscules
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build et push (une seule fois)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.lowercase.outputs.owner }}/odoo-baam:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Notifier Discord en cas d'échec
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "embeds": [{
              "title": "❌ Échec du pipeline — job: ${{ github.job }}",
              "color": 15158332,
              "fields": [{"name": "Logs", "value": "[Voir les logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}]
            }]
          }' ${{ secrets.DISCORD_WEBHOOK }}

  security-scan:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Scan de vulnérabilités avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-image.outputs.image_tag }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  test:
    needs: build-image
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo_pwd_2026
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: --health-cmd="pg_isready -U odoo" --health-interval=5s --health-retries=10
    steps:
      - name: Login registre
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Pull de l'image déjà construite
        run: docker pull ${{ needs.build-image.outputs.image_tag }}
      - name: Lancer les tests
        run: |
          docker run --rm --network=host \
            -e HOST=localhost -e USER=odoo -e PASSWORD=odoo_pwd_2026 \
            ${{ needs.build-image.outputs.image_tag }} \
            odoo --db_host=localhost --db_user=odoo --db_password=odoo_pwd_2026 \
                 -d test_db --test-enable --test-tags /mon_module_demo \
                 --stop-after-init -i mon_module_demo
      - name: Notifier Discord en cas d'échec
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "embeds": [{
              "title": "❌ Échec du pipeline — job: ${{ github.job }}",
              "color": 15158332,
              "fields": [{"name": "Logs", "value": "[Voir les logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}]
            }]
          }' ${{ secrets.DISCORD_WEBHOOK }}

  tag-latest:
    needs: [test, security-scan, build-image]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login registre
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Promouvoir en :latest
        run: |
          docker pull ${{ needs.build-image.outputs.image_tag }}
          docker tag ${{ needs.build-image.outputs.image_tag }} ghcr.io/${{ needs.build-image.outputs.owner }}/odoo-baam:latest
          docker push ghcr.io/${{ needs.build-image.outputs.owner }}/odoo-baam:latest

  deploy-staging:
    needs: tag-latest
    if: github.ref == 'refs/heads/staging'
    runs-on: self-hosted
    environment: staging
    steps:
      - name: Sauvegarder l'image actuellement déployée
        run: |
          docker inspect odoo_app_staging --format='{{index .Config.Image}}' > /tmp/previous_staging_image.txt || echo "none" > /tmp/previous_staging_image.txt

      - name: Déploiement staging
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          cd ~/deployments/staging
          docker compose pull
          docker compose up -d

      - name: Health check
        id: healthcheck
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:8070/web/login > /dev/null; then
              echo "✅ Odoo répond correctement"
              exit 0
            fi
            sleep 5
          done
          exit

      - name: Rollback complet si échec (image + base de données)
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          echo "🔴 Échec détecté, rollback en cours..."

          # 1. Revenir à l'ancienne image
          PREVIOUS_IMAGE=$(cat /tmp/previous_staging_image.txt)
          if [ "$PREVIOUS_IMAGE" != "none" ]; then
            cd ~/deployments/staging
            sed -i "s|image:.*|image: $PREVIOUS_IMAGE|" docker-compose.yml
          fi

          # 2. Restaurer la base de données depuis le backup pris avant déploiement
          docker compose stop odoo
          docker cp ~/backups/staging/${BACKUP_FILE} odoo_db_staging:/tmp/restore.dump
          docker exec odoo_db_staging pg_restore -U odoo -d postgres --clean --if-exists /tmp/restore.dump

          # 3. Redémarrer avec l'ancienne image + la DB restaurée
          docker compose up -d

          echo "✅ Rollback terminé : image et base de données restaurées"

      - name: Notifier Discord en cas d'échec
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "embeds": [{
              "title": "❌ Échec déploiement staging — rollback effectué",
              "color": 15158332,
              "fields": [
                {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                {"name": "Logs", "value": "[Voir les logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }' ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notifier Discord en cas de succès
        if: success()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "embeds": [{
              "title": "✅ Déploiement staging réussi",
              "color": 3066993,
              "fields": [{"name": "Commit", "value": "${{ github.sha }}", "inline": true}]
            }]
          }' ${{ secrets.DISCORD_WEBHOOK }}

      - name: Backup PostgreSQL avant déploiement
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          docker exec odoo_db_staging pg_dump -U odoo -d postgres -F c -f /tmp/backup.dump
          docker cp odoo_db_staging:/tmp/backup.dump ~/backups/staging/backup_${TIMESTAMP}.dump
          echo "BACKUP_FILE=backup_${TIMESTAMP}.dump" >> $GITHUB_ENV
          # On garde seulement les 10 derniers backups pour ne pas saturer le disque
          ls -t ~/backups/staging/*.dump | tail -n +11 | xargs -r rm --

  deploy-production:
    needs: tag-latest
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production
    steps:
      - name: Déterminer la couleur active et la cible
        id: color
        run: |
          if grep -q "odoo_blue" ~/deployments/production/nginx/nginx.conf; then
            echo "target=green" >> $GITHUB_OUTPUT
            echo "current=blue" >> $GITHUB_OUTPUT
          else
            echo "target=blue" >> $GITHUB_OUTPUT
            echo "current=green" >> $GITHUB_OUTPUT
          fi

      - name: Déployer la nouvelle version sur la couleur inactive
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          cd ~/deployments/production
          docker compose pull odoo_${{ steps.color.outputs.target }}
          docker compose up -d odoo_${{ steps.color.outputs.target }}

      - name: Health check sur la couleur inactive
        id: healthcheck
        run: |
          for i in {1..15}; do
            if docker exec odoo_${{ steps.color.outputs.target }} curl -sf http://localhost:8069/web/login > /dev/null; then
              echo "✅ Nouvelle version prête"
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Générer la config nginx pour la couleur cible
        if: steps.healthcheck.outcome == 'success'
        run: |
          cat > ~/deployments/production/nginx/nginx.conf << NGINXEOF
          events {}
          http {
              upstream odoo_active {
                  server odoo_${{ steps.color.outputs.target }}:8069;
              }
              server {
                  listen 80;
                  location / {
                      proxy_pass http://odoo_active;
                      proxy_set_header Host \$host;
                      proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  }
              }
          }
          NGINXEOF

      - name: Valider la syntaxe nginx
        if: steps.healthcheck.outcome == 'success'
        run: docker exec odoo_proxy nginx -t

      - name: Recharger nginx (bascule du trafic)
        if: steps.healthcheck.outcome == 'success'
        run: docker exec odoo_proxy nginx -s reload

      - name: Notifier Discord en cas d'échec
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "embeds": [{
              "title": "❌ Échec déploiement production — trafic non basculé",
              "color": 15158332,
              "fields": [
                {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                {"name": "Logs", "value": "[Voir les logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }' ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notifier Discord en cas de succès
        if: success()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "embeds": [{
              "title": "✅ Déploiement production réussi (blue-green)",
              "color": 3066993,
              "fields": [
                {"name": "Nouvelle couleur active", "value": "${{ steps.color.outputs.target }}", "inline": true},
                {"name": "Commit", "value": "${{ github.sha }}", "inline": true}
              ]
            }]
          }' ${{ secrets.DISCORD_WEBHOOK }}
      - name: Backup PostgreSQL avant déploiement
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          docker exec odoo_db_production pg_dump -U odoo -d postgres -F c -f /tmp/backup.dump
          docker cp odoo_db_production:/tmp/backup.dump ~/backups/ptoduction/backup_${TIMESTAMP}.dump
          echo "BACKUP_FILE=backup_${TIMESTAMP}.dump" >> $GITHUB_ENV
          # On garde seulement les 10 derniers backups pour ne pas saturer le disque
          ls -t ~/backups/production/*.dump | tail -n +11 | xargs -r rm --
