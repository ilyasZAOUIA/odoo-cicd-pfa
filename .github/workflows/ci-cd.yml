name: CI/CD Odoo BAAM

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install flake8 pylint-odoo
      - run: flake8 custom_addons/mon_module_demo/
      - run: pylint --load-plugins=pylint_odoo -d all -e odoolint custom_addons/mon_module_demo/

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo_pwd_2026
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U odoo"
          --health-interval=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t odoo-baam:test .
      - name: Run tests
        run: |
          docker run --rm --network=host \
            -e HOST=localhost -e USER=odoo -e PASSWORD=odoo_pwd_2026 \
            -v ${{ github.workspace }}/custom_addons:/mnt/extra-addons \
            odoo-baam:test \
            odoo --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons \
                 --db_host=localhost --db_user=odoo --db_password=odoo_pwd_2026 \
                 -d test_db --test-enable --test-tags /mon_module_demo \
                 --stop-after-init -i mon_module_demo

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: odoo-baam:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
