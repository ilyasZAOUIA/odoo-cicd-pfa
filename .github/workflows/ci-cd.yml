name: CI/CD Odoo BAAM

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install flake8 pylint-odoo
      - run: flake8 custom_addons/mon_module_demo/
      - run: pylint --load-plugins=pylint_odoo -d all -e odoolint --disable=manifest-required-author custom_addons/mon_module_demo/

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo_pwd_2026
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U odoo"
          --health-interval=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t odoo-baam:test .
      - name: Run tests
        run: |
          docker run --rm --network=host \
            -e HOST=localhost -e USER=odoo -e PASSWORD=odoo_pwd_2026 \
            -v ${{ github.workspace }}/custom_addons:/mnt/extra-addons \
            odoo-baam:test \
            odoo --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons \
                 --db_host=localhost --db_user=odoo --db_password=odoo_pwd_2026 \
                 -d test_db --test-enable --test-tags /mon_module_demo \
                 --stop-after-init -i mon_module_demo

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convertir le nom du repo en minuscules
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build et push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/odoo-baam:${{ github.sha }}
            ghcr.io/${{ steps.lowercase.outputs.owner }}/odoo-baam:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy-staging:
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/staging'
    runs-on: self-hosted
    environment: staging
    steps:
      - name: Sauvegarder le tag actuellement déployé
        run: |
          docker inspect odoo_app_staging --format='{{index .Config.Image}}' > /tmp/previous_staging_image.txt || echo "aucun déploiement précédent" > /tmp/previous_staging_image.tx

      - name: Déploiement staging
        run: |
          echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          cd ~/deployments/staging
          docker compose pull
          docker compose up -d

      - name: Health check (smoke test)
        run: |
          echo "Attente du démarrage d'Odoo..."
          for i in {1..15}; do
            if curl -sf http://localhost:8070/web/login > /dev/null; then
              echo "✅ Odoo répond correctement"
              exit 0
            fi
            echo "Tentative $i/15, nouvel essai dans 5s..."
            sleep 5
          done
          echo "❌ Odoo ne répond pas après 75s"
          exit 1

      - name: Rollback automatique si échec du health check
        if: failure()
        run: |
          echo "Rollback vers l'image précédente..."
          PREVIOUS_IMAGE=$(cat /tmp/previous_staging_image.txt)
          cd ~/deployments/staging
          sed -i "s|image:.*|image: $PREVIOUS_IMAGE|" docker-compose.yml
          docker compose up -d

  deploy-production:
    needs: [build ,security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production
    steps:
      - name: Sauvegarder le tag actuellement déployé
        run: |
          docker inspect odoo_app_prod --format='{{index .Config.Image}}' > /tmp/previous_staging_image.txt || echo "aucun déploiement précédent" > /tmp/previous_production_image.txt

      - name: Déploiement production
        run: |
          echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          cd ~/deployments/production
          docker compose pull
          docker compose up -d

      - name: Health check (smoke test)
        run: |
          echo "Attente du démarrage d'Odoo..."
          for i in {1..15}; do
            if curl -sf http://localhost:8071/web/login > /dev/null; then
              echo "✅ Odoo répond correctement"
              exit 0
            fi
            echo "Tentative $i/15, nouvel essai dans 5s..."
            sleep 5
          done
          echo "❌ Odoo ne répond pas après 75s"
          exit 1

      - name: Rollback automatique si échec du health check
        if: failure()
        run: |
          echo "Rollback vers l'image précédente..."
          PREVIOUS_IMAGE=$(cat /tmp/previous_staging_image.txt)
          cd ~/deployments/production
          sed -i "s|image:.*|image: $PREVIOUS_IMAGE|" docker-compose.yml
          docker compose up -d

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Scan de vulnérabilités avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/ilyaszaouia/odoo-baam:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
  notify-success:
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Notifier Discord (succès)
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "✅ **Déploiement réussi** — Odoo BAAM\nBranche: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nAuteur: ${{ github.actor }}"}' \
            ${{ secrets.DISCORD_WEBHOOK }}

  notify-failure:
    needs: [lint, test, build, security-scan, deploy-staging, deploy-production]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Notifier Discord (échec)
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "❌ **Échec du pipeline** — Odoo BAAM\nBranche: ${{ github.ref_name }}\nVoir les logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            ${{ secrets.DISCORD_WEBHOOK }}
