name: Lint Odoo Modules

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les linters
        run: pip install flake8 pylint-odoo

      - name: Lancer flake8
        run: flake8 custom_addons/mon_module_demo/

      - name: Lancer pylint-odoo
        run: pylint --load-plugins=pylint_odoo -d all -e odoolint --disable=manifest-required-author custom_addons/mon_module_demo/
